<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .udemy{
            width: 50%;
            padding: 10px;
            background-color: black;
            color: white;
            text-align: center;
            position: fixed;
            right: 0;
            bottom: 0;
        } 
        .red{
            width: 100px;
            height: 100px;
            background-color: red;
            position: relative;
            top: 20px;
            left: 20px;
            z-index: 1;
        }
        .blue{
            width: 100px;
            height: 100px;
            background-color: blue;
            position: relative;
            top: 5px;
            left: 5px;
        }
        .outer-box{
            width:  400px;
            height: 400px;
            background-color: grey;
            position: relative;
         }
        .inner-box{
            width: 100px;
            height: 100px;
            background-color: blue;
            position:absolute;
            right: 10px;
            bottom: 10px;  
         }
          span{
            width: 100px;
            height: 100px;
            background-color: red;
            display: inline-block;
            position: relative;
            left: 15px;
            z-index: -1;
          }
    </style>
</head>
<body style="height: 1000px;">
     <div class="udemy">Udemy</div> 
     <div class="red"></div>
     <div class="blue"></div>
     <div class="outer-box">
     <div class="inner-box"></div>
     <span></span>
     Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime, dolorem!
     
</body>
</html>
