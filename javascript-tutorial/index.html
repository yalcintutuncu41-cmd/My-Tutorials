<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script src="source.js">
        // Sınıf tanımlama
        class Car {
            constructor(color, brand) {
                this.color = color;
                this.brand = brand;
            }

            drive() {
                console.log(this.brand + " gidiyor");
            }
        }

        const car1 = new Car("red", "BMW");
        const car2 = new Car("black", "Mercedes");

        console.log(car1.color);
        console.log(car2.brand);

        car1.drive();

        //forEach örneği
        let isimler = ["Ayşe", "Fatma", "Burak", "Deniz"];
        isimler.forEach((isim) => console.log(isim));

        //map örneği
        let isimler2 = [
            "Demet",
            "Ufuk",
            "Çağla",
            "Betül"
        ];


        isimler2.map((isim, index) => {
            document.write(isim);
            document.write("<br>");
            document.write(index);
            document.write("<br>");
        });

        /*Object*/
        const car = {
            brand: "fiat",
            year: "2008",
            color: "grey",
            door: 4,
            myFunction: function () {
                return this.brand + " " + this.color;
            },
            function2() {
                return this.color + " Kapı sayisi:" + this.door;
            }

        };
        /*Object properties call methods*/
        car.brand;
        car["year"];

        let age = 25;
        age = 26;

        const userName = "Ali";
        console.log(userName);  
    </script>
</body>

</html>
