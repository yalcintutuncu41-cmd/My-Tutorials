<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let isimler = [
            "Demet",
            "Ufuk",
            "Çağla",
            "Betül"
        ];


        isimler.map((isim, index) => {
            document.write(isim);
            document.write("<br>");
            document.write(index);
            document.write("<br>");
        });
    </script>
</body>

</html>
