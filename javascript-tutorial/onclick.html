<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--script tag in head-->
    <script>
        function myfunction() {
            document.getElementById("invoke").innerHTML = "invoked";
        }
    </script>
</head>

<body>
    <p>Javascript can change HTML Content</p>
    <p id="demo">Demo</p>
    <!--inner html-->
    <button type="button" onclick="document.getElementById('demo').innerHTML = ('<h2>Hello world</h2>') ">Click
        me</button>
    <!--javascript style-->
    <p>Javascript can change font size</p>
    <p id="paragraph">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam, deleniti?</p>
    <button type="button" onclick="document.getElementById('paragraph').style.fontSize='35px'">Click me</button>
    <!--inner text-->
    <p id="text">Javascript can change text content</p>
    <button type="button" onclick="document.getElementById('text').innerText ='text content was changed'">Click
        me</button>
    <!--style display-->
    <p id="display">This text will be unappear</p>
    <button type="button" onclick="document.getElementById('display').style.display = 'none'">Click me</button>
    <!--invoke-->
    <p id="invoke">Text will change from myfunction()</p>
    <button type="button" onclick="myfunction()">Click me</button>
</body>

</html>
