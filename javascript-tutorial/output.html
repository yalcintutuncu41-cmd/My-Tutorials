<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Cıktı Verme</title>
</head>

<body>
    <script>
        // Document ile cıktı verme
        document.write("Merhaba Dünya!<br>");
        document.write("JavaScript ile cıktı verme örneği.");
        // Console ile cıktı verme
        console.log("Bu mesaj konsola yazdırıldı.");
        // Alert ile
        alert("Bu bir uyarı mesajıdır.");
        console.log(window);
        console.warn("Bu bir uyarı mesajıdır.");
        let isim = prompt("Lütfen adınızı girin:");
        console.log("Kullanıcının girdiği isim: " + isim)
    </script>
</body>

</html>
