<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" media="(max-width:768px)" href="css/tablet.css">
    <link rel="stylesheet" media="(max-width:500px)" href="css/phone.css">
    
</head>
<body>
    <div class="main-container">
        <header>
            <div class="header-container">
                <h2>Yalçın Tütüncü</h2>
                <nav>
                    <ul>
                        <li><a href="#about">About</a></li>
                        <li><a href="#projects">Projects</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <section id="about">
            <img src="/images/20250803_164726.jpg" alt="">
            <p>Merhabalar ben Yalçın Tütüncü</p>
        </section>
        <section id="projects">
            <h2 class="text-center">Projects</h2>
            <ul class="text-center">
                <li>To Do List</li>
                <li>Weather App</li>
                <li>Movie App</li>
            </ul>
        </section>
        <footer id="contact">
            <form action="">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email">
                <label for="message">Message</label>
                <textarea name="message" id="message" rows="10" cols="30"></textarea>
                <button type="submit" class="text-center">Send</button>
            </form>
        </footer>
    </div>
</body>
</html>
